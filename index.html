<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일 청첩장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="main">
    <img src="main.jpg" class="main-photo">
    <p class="small">Wedding Invitation</p>
    <h1>박갑수 ♥ 곽애리</h1>
    <p class="date">2026.10.11 SUN</p>
    <p class="place">라포에트 웨딩홀</p>
  </section>

<section class="gallery">
  <h2>Gallery</h2>

  <div class="gallery-box">
    <button class="arrow" onclick="prevPhoto()">‹</button>

    <img id="galleryImage" src="photo01.jpg" alt="웨딩 사진">

    <button class="arrow" onclick="nextPhoto()">›</button>
  </div>

  <p id="photoNumber">1 / 5</p>
</section>

  <section class="message">
    <h2>초대합니다</h2>
    <p>
      서로 다른 길을 걸어온 두 사람이<br>
      이제 같은 방향을 바라보며<br>
      평생의 동반자가 되고자 합니다.<br><br>
      귀한 걸음으로 축복해 주시면<br>
      큰 기쁨이 되겠습니다.
    </p>
  </section>

  <section class="info">
    <h2>예식 안내</h2>
    <p>2026년 10월 11일 일요일</p>
    <p>오후 1시 30분</p>
    <p 라포에르 웨딩홀</p>
    <p>경기도 광명시 광명역로 21 KTX광명역 동편 B1</p>
  </section>

  <section class="buttons">
    <button onclick="openMap()">지도 보기</button>
    <button onclick="copyAccount()">계좌번호 복사</button>
  </section>

<section class="rsvp">
  <h2>참석 여부 전달</h2>
  <p>참석 여부를 알려주시면 감사하겠습니다.</p>

  <input type="text" id="guestName" placeholder="성함">

  <select id="attendance">
    <option value="">참석 여부 선택</option>
    <option value="참석">참석</option>
    <option value="불참">불참</option>
  </select>

  <input type="number" id="guestCount" placeholder="참석 인원">

  <select id="meal">
    <option value="">식사 여부 선택</option>
    <option value="식사함">식사함</option>
    <option value="식사 안함">식사 안함</option>
  </select>

  <textarea id="message" placeholder="전달사항"></textarea>

  <button onclick="submitRSVP()">참석 여부 제출</button>
</section>

  <section class="ending">
    <p>저희의 시작을 함께 축복해 주셔서 감사합니다.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
